chat:
  type: chat
  params:
    provider:
      api_key: ${env['OPENROUTER_API_KEY']}
      base_url: ${env.get('OPENROUTER_BASE_URL', 'https://openrouter.ai/api/v1')}
      site_url: ${env.get('SITE_URL', 'http://localhost:3000')}
      app_title: ${env.get('APP_TITLE', 'Lawyer Chat Bot')}

    default_model: openai

    # selected_model (sent by the frontend) -> OpenRouter model configuration.
    # Mirrors lib/model-config.ts from the Next.js app.
    models:
      openai:
        name: "~anthropic/claude-sonnet-latest"
        temperature: 0.7
        max_tokens: 16000
        web_search:
          enabled: true
          max_results: 5
      anthropic:
        name: "anthropic/claude-opus-4.5"
        temperature: 0.7
        max_tokens: 16000
        web_search:
          enabled: true
          max_results: 5
      gemini:
        name: "google/gemini-2.5-flash"
        temperature: 0.7
        max_tokens: 16000
        web_search:
          enabled: true
          max_results: 5
      thinking:
        name: "openai/gpt-5.2"
        reasoning_effort: high
        max_tokens: 32000
        web_search:
          enabled: true
          max_results: 5

    # LangGraph checkpointer (conversation state per thread_id == session_id).
    # Default is in-memory. Set type: postgres + conn_string for durable state.
    persistence:
      type: ${env.get('CHECKPOINTER_TYPE', 'memory')}
      conn_string: ${env.get('CHECKPOINTER_DB_URL', '')}
