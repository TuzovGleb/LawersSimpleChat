chat:
  type: chat
  params:
    provider:
      api_key: ${env['OPENROUTER_API_KEY']}
      base_url: ${env.get('OPENROUTER_BASE_URL', 'https://openrouter.ai/api/v1')}
      site_url: ${env.get('SITE_URL', 'http://localhost:3000')}
      app_title: ${env.get('APP_TITLE', 'Lawyer Chat Bot')}

    default_model: fast

    # selected_model (sent by the frontend) -> OpenRouter model configuration.
    #
    # SECURITY: these keys are the PUBLIC vocabulary — the selected key travels to
    # the browser (request payload + metadata.modelUsed in the SSE ``final`` event,
    # incl. on fallback). They are deliberately VENDOR-NEUTRAL (fast/thinking/
    # power/alt) so nothing on the wire discloses the underlying model or provider
    # (see prompt.py section [12]). The real OpenRouter model id lives only in
    # ``name`` and never leaves the backend. Do NOT rename a key back to a vendor
    # name (openai/anthropic/gemini/claude/gpt…).
    #
    # ``fallback`` lists other model keys to try, in order, if a model errors
    # (transient API/5xx) or returns an empty response. Defaults below prefer a
    # different provider first (to survive a single-provider outage) then the
    # strongest model. Adjust freely.
    #
    # ``caching`` (optional, default "auto") controls prompt-cache markup per
    # model: "auto" picks the vendor's strategy from the model id prefix
    # (anthropic/* gets explicit cache_control breakpoints — system prompt,
    # the last user turn and the last two tool results, which keeps the tool
    # loop cached incrementally even when the web plugin injects volatile
    # search results; google/openai/z-ai/deepseek cache automatically on the
    # provider side, no markup); "off" disables markup. See
    # app/rag_core/caching.py.
    models:
      fast:
        name: "anthropic/claude-sonnet-4.6"
        temperature: 0.7
        max_tokens: 16000
        fallback: [alt, power]
        web_search:
          enabled: true
          max_results: 5
      power:
        name: "anthropic/claude-opus-4.5"
        temperature: 0.7
        max_tokens: 16000
        fallback: [alt, fast]
        web_search:
          enabled: true
          max_results: 5
      alt:
        name: "google/gemini-2.5-flash"
        temperature: 0.7
        max_tokens: 16000
        fallback: [fast, power]
        web_search:
          enabled: true
          max_results: 5
      thinking:
        # Same base model as the 'fast' entry (Claude Sonnet), but with reasoning
        # enabled. No temperature here: Claude rejects a custom temperature when
        # extended thinking is on (must be 1 / unset).
        name: "anthropic/claude-sonnet-4.6"
        reasoning_effort: high
        max_tokens: 32000
        # Drop to plain (non-reasoning) Sonnet, then a different provider.
        fallback: [fast, alt]
        web_search:
          enabled: true
          max_results: 5
      lite:
        # Internal-only entry: the drafting tool's line classifier
        # (build_segmenter_llm) prefers this key. Labelling numbered lines with
        # 12 block types doesn't need the default chat model — a cheap fast
        # model cuts both the drafting turn's latency and its cost. Not offered
        # in the UI; harmless if a crafted request selects it for chat.
        # NB: the segmenter takes only `name` from here — temperature 0,
        # max_tokens and web_search=off are pinned in build_segmenter_llm; the
        # values below only apply if this key is ever used as a chat model.
        name: "anthropic/claude-haiku-4.5"
        temperature: 0
        max_tokens: 16000
        fallback: [fast]
        web_search:
          enabled: false
      # NB: document OCR/extraction moved to its own config-driven recognizer
      # registry — see recognition.yaml (sotaocr -> llm fallback chain). The LLM
      # recognizer pins google/gemini-3.5-flash there, so there is no longer a
      # 'document_extraction' chat model here.
