app:
  # Shared secret expected from the Next.js proxy (header: X-Backend-Secret).
  backend_secret: ${env.get('BACKEND_SHARED_SECRET', '')}

  # Escape hatch: run WITHOUT a shared secret (fail-open auth). LOCAL DEV ONLY.
  # When empty (default) a missing backend_secret makes the backend refuse all
  # authenticated endpoints (fail closed) — correct for the public container.
  allow_insecure: ${env.get('BACKEND_ALLOW_INSECURE', '')}

  # Supabase service-role access (same project the Next.js app uses).
  supabase:
    url: ${env.get('SUPABASE_URL', '')}
    service_role_key: ${env.get('SUPABASE_SERVICE_ROLE_KEY', '')}

  # CORS origins allowed to call the backend directly (comma separated).
  # When all traffic goes through the Next.js proxy this can stay empty.
  cors_origins: ${env.get('BACKEND_CORS_ORIGINS', '')}

  # OpenSearch for court practice full-text search.
  opensearch:
    url: ${env.get('OPENSEARCH_URL', 'http://localhost:9200')}
    index_alias: ${env.get('OPENSEARCH_INDEX_ALIAS', 'court_decisions')}
    top_k: ${env.get('OPENSEARCH_TOP_K', '8')}

  # S3 / Yandex Object Storage — read uploaded documents to extract their text.
  # endpoint/region default to Yandex Object Storage (no separate secret needed),
  # matching lib/s3-client.ts on the Next.js side.
  s3:
    bucket: ${env.get('S3_BUCKET_NAME', '')}
    access_key_id: ${env.get('S3_ACCESS_KEY_ID', '')}
    secret_access_key: ${env.get('S3_SECRET_ACCESS_KEY', '')}
    endpoint_url: ${env.get('S3_ENDPOINT', 'https://storage.yandexcloud.net')}
    region: ${env.get('S3_REGION', 'ru-central1')}
