logging:
  version: 1
  disable_existing_loggers: False
  formatters:
    simple:
      format: '[%(asctime)s] [%(levelname)s] [%(name)s] [%(funcName)s]: %(message)s'
      datefmt: '%Y-%m-%dT%H:%M:%S%z'

    json:
      (): app.utils.JSONFormatter
      fmt_keys:
        level: levelname
        message: message
        timestamp: timestamp
        logger: name
        module: module
        function: funcName
        line: lineno
        thread_name: threadName

  handlers:
    console:
      level: INFO
      class: logging.StreamHandler
      formatter: simple
      stream: ext://sys.stdout

    file:
      level: DEBUG
      class: logging.handlers.RotatingFileHandler
      formatter: json
      filename: ${logs_path}/chat.log
      maxBytes: 10485760 # 10MB
      backupCount: 5
      encoding: utf-8

  loggers:
    httpx:
      level: WARNING
      handlers: [console, file]
      propagate: false

    httpcore:
      level: WARNING
      handlers: [file]
      propagate: false

    openai._base_client:
      level: WARNING
      handlers: [file]
      propagate: false

    app:
      level: DEBUG
      handlers: [console, file]
      propagate: false

  root:
    level: INFO
    handlers: [console, file]
