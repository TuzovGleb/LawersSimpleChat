recognition:
  # Document OCR / text recognition. Resolved from the config-driven recognizer
  # registry (app/rag_core/recognizers) — same pattern as the rag_core chat models.
  #
  # Single LLM recognizer (no SotaOCR, no fallback chain). PDFs run the per-page
  # text-layer gate first (recognizers/pdf_gate.py): born-digital pages come from
  # the text layer with zero LLM calls; only scan/garbled pages are OCR'd in
  # parallel — per-page hard wall + absolute deadline + circuit breaker, partial
  # results instead of all-or-nothing. Images go through vision. Model:
  # google/gemini-3-flash-preview — chosen after head-to-head OCR tests on real
  # RU legal scans (best accuracy + ~2.5x faster, no page-drops with the
  # production per-page prompt).
  #
  # To add SotaOCR / a fallback later, wrap this in {type: fallback, params: {chain: [...]}}.
  recognizer:
    type: llm
    params:
      provider:
        api_key: ${env['OPENROUTER_API_KEY']}
        base_url: ${env.get('OPENROUTER_BASE_URL', 'https://openrouter.ai/api/v1')}
        site_url: ${env.get('SITE_URL', 'http://localhost:3000')}
        app_title: ${env.get('APP_TITLE', 'Lawyer Chat Bot')}
      model:
        name: "google/gemini-3-flash-preview"
        temperature: 0
        max_tokens: 16384
