recognition:
  # Document OCR / text recognition. Resolved from the config-driven recognizer
  # registry (app/rag_core/recognizers) — same pattern as the rag_core chat models.
  #
  # Single LLM recognizer (no SotaOCR, no fallback chain): behaves exactly like the
  # previous per-page OCR pipeline — PDFs are split into single pages and OCR'd in
  # parallel (concurrency 5, per-page retry, all-or-nothing -> single-request
  # fallback); images go through vision. The only change vs the old code is the
  # model: google/gemini-3-flash-preview (was gemini-3.5-flash) — chosen after
  # head-to-head OCR tests on real RU legal scans (best accuracy + ~2.5x faster,
  # no page-drops with the production per-page prompt).
  #
  # To add SotaOCR / a fallback later, wrap this in {type: fallback, params: {chain: [...]}}.
  recognizer:
    type: llm
    params:
      provider:
        api_key: ${env['OPENROUTER_API_KEY']}
        base_url: ${env.get('OPENROUTER_BASE_URL', 'https://openrouter.ai/api/v1')}
        site_url: ${env.get('SITE_URL', 'http://localhost:3000')}
        app_title: ${env.get('APP_TITLE', 'Lawyer Chat Bot')}
      model:
        name: "google/gemini-3-flash-preview"
        temperature: 0
        max_tokens: 16384
